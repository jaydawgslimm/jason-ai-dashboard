<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JayDawgSlimm Command Center</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#000;
color:white;
}

header{
padding:25px;
}

.portfolio{
font-size:3.5rem;
font-weight:700;
}

.gain{
font-size:1.4rem;
color:#00c805;
margin-top:8px;
}

.mainChart{
height:320px;
margin:15px;
border-radius:20px;
background:linear-gradient(
180deg,
rgba(0,200,5,.18),
rgba(0,200,5,.02)
);
border:1px solid #111;
}

.timeframes{
display:flex;
justify-content:center;
gap:12px;
padding:10px 0 20px;
}

.timeframes button{
background:#111;
color:white;
border:none;
padding:10px 16px;
border-radius:999px;
cursor:pointer;
}

.timeframes button.active{
background:#00c805;
color:black;
font-weight:700;
}

.section{
padding:20px;
}

.section h2{
margin-bottom:15px;
font-size:1.4rem;
}

.holding{
background:#0a0a0a;
border:1px solid #181818;
border-radius:20px;
margin-bottom:18px;
padding:18px;
}

.topRow{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.symbol{
font-size:1.4rem;
font-weight:700;
}

.value{
color:#00c805;
font-weight:700;
}

.stockChart{
height:120px;
background:#050505;
border-radius:12px;
}

.cryptoGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.crypto{
background:#0a0a0a;
border:1px solid #181818;
border-radius:18px;
padding:18px;
text-align:center;
}

.cryptoName{
font-size:1.2rem;
font-weight:700;
margin-bottom:8px;
}

.watchlist{
background:#0a0a0a;
border:1px solid #181818;
padding:15px;
border-radius:15px;
margin-bottom:10px;
}

.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#050505;
border-top:1px solid #151515;
display:flex;
justify-content:space-around;
padding:14px;
}

.bottomNav div{
color:#999;
}

.bottomNav .active{
color:#00c805;
font-weight:bold;
}

.spacer{
height:90px;
}
