<div class="card">
    <h2>🚀 AI Portfolio Radar</h2>

    <div class="stock" id="NVDA">
        <span>NVIDIA</span>
        <span class="price">$0.00</span>
    </div>

    <div class="stock" id="AVGO">
        <span>Broadcom</span>
        <span class="price">$0.00</span>
    </div>

    <div class="stock" id="PLTR">
        <span>Palantir</span>
        <span class="price">$0.00</span>
    </div>

    <div class="stock" id="AMD">
        <span>AMD</span>
        <span class="price">$0.00</span>
    </div>
</div>

<script>
const stocks = ["NVDA","AVGO","PLTR","AMD"];

function updateStocks(){
    stocks.forEach(stock=>{
        const randomPrice=(Math.random()*500+100).toFixed(2);
        document.querySelector(`#${stock} .price`).innerText="$"+randomPrice;
    });
}

updateStocks();
setInterval(updateStocks,3000);
</script>
