<!DOCTYPE html>
<html>
<head>
<title>JayDawgSlimm Command Center</title>

<style>
body{
background:#050505;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:0;
}

.header{
padding:25px;
border-bottom:1px solid #222;
}

.portfolio{
font-size:60px;
font-weight:bold;
}

.gain{
color:#00ff66;
font-size:24px;
}

.chart{
height:250px;
margin:20px;
border-radius:15px;
background:linear-gradient(
180deg,
rgba(0,255,102,.15),
rgba(0,255,102,0)
);
border:1px solid #00ff66;
}

.section{
padding:20px;
}

.card{
background:#111;
border-radius:15px;
padding:15px;
margin-bottom:15px;
border:1px solid #222;
cursor:pointer;
}

.card:hover{
border-color:#00ff66;
}

.symbol{
font-size:28px;
font-weight:bold;
}

.value{
color:#00ff66;
font-size:22px;
}

.mini-chart{
height:80px;
margin-top:10px;
background:#0d0d0d;
border-radius:10px;
}

.crypto-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.crypto{
background:#111;
padding:15px;
border-radius:12px;
text-align:center;
}

.footer{
height:100px;
}
</style>
</head>

<body>

<div class="header">

<div class="portfolio">
$1,006.23
</div>

<div class="gain">
▲ +$4.50 Today
</div>

</div>

<div class="chart">
<!-- Live Portfolio Chart -->
</div>

<div class="section">

<h2>AI Leaders</h2>

<div class="card">
<div class="symbol">NVDA</div>
<div class="value">$522.71</div>
<div class="mini-chart"></div>
</div>

<div class="card">
<div class="symbol">AMD</div>
<div class="value">$219.60</div>
<div class="mini-chart"></div>
</div>

<div class="card">
<div class="symbol">AVGO</div>
<div class="value">$34.35</div>
<div class="mini-chart"></div>
</div>

<div class="card">
<div class="symbol">TSLA</div>
<div class="value">$31.89</div>
<div class="mini-chart"></div>
</div>

</div>

<div class="section">

<h2>Crypto Radar</h2>

<div class="crypto-grid">

<div class="crypto">XRP</div>
<div class="crypto">DOGE</div>

<div class="crypto">NEAR</div>
<div class="crypto">ETH</div>

<div class="crypto">SOL</div>
<div class="crypto">PEPE</div>

<div class="crypto">SHIB</div>
<div class="crypto">BONK</div>

</div>

</div>

<div class="section">

<h2>AI Watchlist</h2>

<div class="card">IONQ</div>
<div class="card">IREN</div>
<div class="card">APLD</div>
<div class="card">SMCI</div>
<div class="card">MRVL</div>

</div>

<div class="footer"></div>

</body>
</html>
